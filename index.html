<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>代码解释器</title>
<style>
:root {
  --bg: #0F172A; --surface: #1E293B; --border: #334155;
  --text: #E2E8F0; --text-soft: #94A3B8; --accent: #38BDF8;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #020617; color: var(--text); min-height: 100vh;
  display: flex; justify-content: center;
}
.app { width:100%; max-width:600px; min-height:100vh; display:flex; flex-direction:column; }

/* Setup */
.setup { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; gap:20px; }
.setup h2 { font-size:20px; }
.setup p { font-size:13px; color: var(--text-soft); text-align:center; line-height:1.7; }
.setup input {
  width:100%; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border);
  background: var(--surface); color: var(--text); font-size:14px; font-family:monospace;
}
.setup button {
  width:100%; padding:14px; border-radius:var(--radius); border:none;
  background: var(--accent); color: #0F172A; font-size:15px; font-weight:700; cursor:pointer;
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; padding:20px; gap:12px; }
.header-bar { display:flex; justify-content:space-between; align-items:center; }
.header-bar h1 { font-size:17px; }
.header-bar button { background:none; border:1px solid var(--border); color:var(--text-soft); padding:4px 12px; border-radius:6px; font-size:11px; cursor:pointer; }

.levels { display:flex; gap:6px; }
.level-btn {
  flex:1; padding:10px 8px; border-radius:var(--radius); border:1px solid var(--border);
  background: var(--surface); color: var(--text-soft); font-size:12px; font-weight:600; cursor:pointer;
  text-align:center; transition: all .2s;
}
.level-btn:hover { border-color: var(--accent); }
.level-btn.active { background: var(--accent); color: #0F172A; border-color: var(--accent); }
.level-btn .sub { font-size:10px; font-weight:400; opacity:.7; display:block; margin-top:1px; }

.code-area { flex:1; display:flex; flex-direction:column; gap:8px; }
.code-area textarea {
  width:100%; height:150px; padding:14px; border-radius:var(--radius); border:1px solid var(--border);
  background: var(--surface); color: var(--text); font-size:13px; font-family: 'Consolas','Source Code Pro',monospace;
  resize:vertical; line-height:1.6;
}
.code-area textarea::placeholder { color: #475569; }

.run-btn {
  width:100%; padding:12px; border-radius:var(--radius); border:none;
  background: var(--accent); color: #0F172A; font-size:14px; font-weight:700; cursor:pointer;
}
.run-btn:disabled { opacity:.5; }

.output {
  flex:1; min-height:100px; max-height:300px; overflow-y:auto;
  padding:16px; border-radius:var(--radius); border:1px solid var(--border);
  background: var(--surface); font-size:13px; line-height:1.8; white-space:pre-wrap; color:#CBD5E1;
}
.output .loading { color: var(--accent); }
.output .error { color: #F87171; }

.tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.tags span { font-size:10px; background: #1E3A5F; color: var(--accent); padding:2px 8px; border-radius:10px; }
.info-row { font-size:11px; color: var(--text-soft); text-align:center; }
.info-row a { color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <!-- Setup -->
  <div id="setup" class="setup">
    <h2>🖥️ 代码解释器</h2>
    <p>三个级别 · 用AI解释任何代码<br>Key只存在浏览器里，不上传任何服务器</p>
    <input id="apiKeyInput" placeholder="输入 DeepSeek API Key" autocomplete="off">
    <button onclick="saveKey()">开始使用</button>
    <p style="font-size:11px;">
      没有Key？去 <a href="https://platform.deepseek.com" style="color:var(--accent)" target="_blank">platform.deepseek.com</a> 免费注册<br>
    </p>
  </div>

  <!-- Main -->
  <div id="main" class="main" style="display:none;">
    <div class="header-bar">
      <h1>🖥️ 代码解释器</h1>
      <button onclick="resetKey()">更换Key</button>
    </div>

    <div class="levels">
      <button class="level-btn active" data-level="0" onclick="setLevel(0)">
        🍎 初级<span class="sub">生活化类比</span>
      </button>
      <button class="level-btn" data-level="1" onclick="setLevel(1)">
        ⚙️ 中级<span class="sub">设计模式</span>
      </button>
      <button class="level-btn" data-level="2" onclick="setLevel(2)">
        🔬 高级<span class="sub">架构与底层</span>
      </button>
    </div>

    <div class="code-area">
      <textarea id="codeInput" placeholder="粘贴代码到这里...&#10;&#10;例如：&#10;def factorial(n):&#10;    return 1 if n <= 1 else n * factorial(n-1)"></textarea>
      <button class="run-btn" id="runBtn" onclick="explain()">🔍 解释代码</button>
    </div>

    <div class="output" id="output">
      <span style="color:#64748B;">选择级别，粘贴代码，点击解释 👆</span>
    </div>

    <div class="info-row">
      <a href="https://voidbloom005.github.io">← 作品集</a>
    </div>
  </div>

</div>

<script>
const PROMPTS = [
  // 初级 - 生活化类比
  `你是代码解释器。用生活化的比喻解释代码，让完全不懂编程的人也能理解。
规则：
- 把代码逻辑比喻成日常场景（做饭、寄快递、整理房间等）
- 不要用术语，如果必须用，先解释术语
- 先概括代码整体做什么，再逐行用比喻解释
- 最后一段总结：这段代码就像一个____
直接开始解释，不要问候，不要使用markdown格式。`,

  // 中级 - 设计模式
  `你是代码解释器。从代码结构和设计模式角度分析这段代码。
规则：
- 指出使用了什么设计模式或编程范式
- 分析函数/模块的职责划分
- 如果有优化空间，指出可以如何重构
- 解释各部分怎么协作完成整体功能
直接开始解释，不要问候，不要使用markdown格式。`,

  // 高级 - 底层原理
  `你是代码解释器。从运行时机制、内存管理和底层原理角度深度分析。
规则：
- 解释内存中发生了什么（栈、堆、引用）
- 分析时间复杂度
- 指出潜在的边界条件问题
- 如果有并发/安全问题，指出
直接开始解释，不要问候。`
]

let level = 0
let apiKey = ''

function init() {
  apiKey = localStorage.getItem('codex-api-key') || ''
  if (apiKey) {
    document.getElementById('setup').style.display = 'none'
    document.getElementById('main').style.display = 'flex'
  }
}

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim()
  if (!key) return
  localStorage.setItem('codex-api-key', key)
  apiKey = key
  document.getElementById('setup').style.display = 'none'
  document.getElementById('main').style.display = 'flex'
}

function resetKey() {
  localStorage.removeItem('codex-api-key')
  apiKey = ''
  document.getElementById('setup').style.display = 'flex'
  document.getElementById('main').style.display = 'none'
}

function setLevel(l) {
  level = l
  document.querySelectorAll('.level-btn').forEach((b,i) => b.classList.toggle('active', i===l))
}

async function explain() {
  const code = document.getElementById('codeInput').value.trim()
  if (!code) return

  const out = document.getElementById('output')
  const btn = document.getElementById('runBtn')
  btn.disabled = true
  btn.textContent = '⏳ 解释中...'
  out.innerHTML = '<span class="loading">正在分析代码...</span>'

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: PROMPTS[level] },
          { role: 'user', content: '请解释以下代码：\n\n' + code }
        ],
        temperature: [0.4, 0.3, 0.2][level],
        max_tokens: 2000
      })
    })

    if (!res.ok) {
      const err = await res.json().catch(()=>({}))
      if (res.status === 401) throw new Error('API Key 无效，请更换')
      if (res.status === 402) throw new Error('API 余额不足')
      throw new Error(err.error?.message || '请求失败')
    }

    const data = await res.json()
    const text = data.choices[0].message.content
    out.innerHTML = escapeHtml(text)
  } catch(e) {
    out.innerHTML = '<span class="error">' + escapeHtml(e.message) + '</span>'
  } finally {
    btn.disabled = false
    btn.textContent = '🔍 解释代码'
  }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

init()
</script>
</body>
</html>
